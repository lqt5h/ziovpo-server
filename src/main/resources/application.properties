# ===== ??????????? ?????????? ?? .env (????????) =====
spring.config.import=optional:file:.env[.properties]


# ===== SERVER PORT =====
server.port=${SERVER_PORT:8080}

# ===== SSL / TLS =====
server.ssl.enabled=true
server.ssl.key-store=classpath:license-keystore-1BIB23392.p12
server.ssl.key-store-password=changeit
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=licensekey
server.ssl.protocol=TLSv1.3

# ===== DATABASE =====
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===== LOGGING =====
logging.level.root=INFO
logging.level.org.springframework.security=DEBUG
logging.level.com.example.demo=DEBUG

# ===== JWT =====
jwt.secret=${JWT_SECRET}
jwt.access-token-expiration=${JWT_ACCESS_TOKEN_EXPIRATION:900000}
jwt.refresh-token-expiration=${JWT_REFRESH_TOKEN_EXPIRATION:604800000}

# ===== DIGITAL SIGNATURE =====
signature.key-store-path=${SIGNATURE_KEYSTORE_PATH:classpath:license-keystore-1BIB23392.p12}
signature.key-store-type=PKCS12
signature.key-store-password=${SIGNATURE_KEYSTORE_PASSWORD:changeit}
signature.key-alias=${SIGNATURE_KEY_ALIAS:licensekey}
signature.key-password=${SIGNATURE_KEY_PASSWORD:changeit}
signature.algorithm=SHA256withRSA
