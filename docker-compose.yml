version: '3.8'

services:
  minio:
    image: minio/minio:latest
    container_name: ziovpo-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
        sleep 5;
        mc alias set local http://minio:9000 minioadmin minioadmin123;
        mc admin user add local ziovpo-app ziovpo-app-secret;
        mc admin policy attach local readwrite --user ziovpo-app;
        mc mb --ignore-existing local/signatures;
        mc anonymous set none local/signatures;
        echo 'MinIO initialized';
      "

volumes:
  minio-data:
